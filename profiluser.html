<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <h1>Profil Utilisateur</h1>
  <div class="Profil-container">
    <form>
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Entrez votre nom"><br>
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom"><br>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Entrez votre email"><br>

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe"><br>
      <label for="confirm_password">Confirmer le mot de passe</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirmez votre mot de passe"><br><br>
      <div class="but">
      <button type="submit">Modifier</button>
      <button type="reset">Annuler</button>
      </div>
    </form>
  </div>
</body>
</html>
